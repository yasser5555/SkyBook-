<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SkyBook</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="forgot-password.css">
</head>

<body>

    <!-- Main Content -->
    <main class="container py-5 d-flex justify-content-center align-items-center min-vh-100">
        <div class="forgot-password-card bg-white p-4 p-md-5 rounded-4 shadow-sm w-100" style="max-width: 500px;">

            <div class="text-center mb-4">
                <a href="#" class="d-inline-flex align-items-center gap-2 text-decoration-none mb-4">
                    <i class="bi bi-airplane-engines-fill text-primary fs-3"></i>
                    <span class="fw-bold fs-4 text-dark">SkyBook</span>
                </a>
                
                <h2 class="fw-bold mb-2">Forgot Password?</h2>
                <p class="text-muted">No worries, we'll send you reset instructions.</p>
            </div>

            <form id="forgotPasswordForm" novalidate>
                <!-- Email -->
                <div class="mb-4 position-relative input-group-custom">
                    <i class="bi bi-envelope position-absolute text-muted"></i>
                    <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
                    <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-3 mb-4 btn-reset">
                    Send Reset Link
                </button>
            </form>

            <div class="text-center">
                <a href="../login/index.html" class="text-muted text-decoration-none d-inline-flex align-items-center gap-2 hover-primary" style="font-size: 0.95rem;">
                    <i class="bi bi-arrow-left"></i> Back to Login
                </a>
            </div>

        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Logic -->
    <script src="forgot-password.js"></script>
</body>

</html>
