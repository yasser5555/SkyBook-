<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SkyBook</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <!-- Main Content -->
    <main class="container py-5 d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-card bg-white p-4 p-md-5 rounded-4 shadow-sm w-100" style="max-width: 500px;">

            <div class="text-center mb-4">
                <a href="#" class="d-inline-flex align-items-center gap-2 text-decoration-none mb-4">
                    <i class="bi bi-airplane-engines-fill text-primary fs-3"></i>
                    <span class="fw-bold fs-4 text-dark">SkyBook</span>
                </a>
                
                <h2 class="fw-bold mb-2">Welcome Back</h2>
                <p class="text-muted">Enter your credentials to access your account.</p>
            </div>

            <form id="loginForm" novalidate>
                <!-- Email -->
                <div class="mb-3 position-relative input-group-custom">
                    <i class="bi bi-envelope position-absolute text-muted"></i>
                    <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
                    <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <!-- Password -->
                <div class="mb-3 position-relative input-group-custom">
                    <i class="bi bi-lock position-absolute text-muted"></i>
                    <input type="password" class="form-control" id="password" placeholder="Password" required>
                    <div class="invalid-feedback">Please enter your password.</div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label text-muted" style="font-size: 0.9rem;" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="../forgot-password/index.html" class="text-primary text-decoration-none fw-medium" style="font-size: 0.9rem;">Forgot Password?</a>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-3 mb-3 btn-login">
                    Login
                </button>
            </form>

            <div class="text-center mb-4">
                <span class="text-muted" style="font-size: 0.9rem;">Don't have an account? <a href="../register/index.html"
                        class="text-primary fw-semibold text-decoration-none">Register</a></span>
            </div>

            <!-- Social Login -->
            <div class="position-relative text-center mb-4">
                <hr class="text-muted">
                <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted"
                    style="font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px;">OR LOGIN WITH</span>
            </div>

            <div class="d-flex gap-3">
                <button type="button"
                    class="btn btn-outline-secondary w-50 py-2 d-flex justify-content-center align-items-center gap-2 btn-social rounded-3">
                    <i class="bi bi-google text-danger"></i> <span class="d-none d-sm-inline">Google</span>
                </button>
                <button type="button"
                    class="btn btn-outline-secondary w-50 py-2 d-flex justify-content-center align-items-center gap-2 btn-social rounded-3">
                    <i class="bi bi-apple text-dark"></i> <span class="d-none d-sm-inline">Apple</span>
                </button>
            </div>

        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Logic -->
    <script src="login.js"></script>
</body>

</html>
